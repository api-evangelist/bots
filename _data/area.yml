features:
- name: Channel Integration
  description: Bot platforms expose adapters that connect a single bot implementation
    to multiple messaging channels — Slack, Microsoft Teams, Discord, Telegram, WhatsApp,
    web chat, and voice — without rewriting conversation logic for each surface.
- name: Intent Recognition and NLU
  description: Conversational AI platforms like Dialogflow, Amazon Lex, IBM watsonx
    Assistant, and Rasa classify user utterances into intents and extract entities,
    mapping free-text input to structured actions.
- name: Dialog Flow Management
  description: Frameworks model multi-turn conversations as state machines, decision
    trees, or graph-based flows, tracking conversation context across turns and routing
    users through branching dialog paths.
- name: Bot SDKs and Builder Tooling
  description: Developer SDKs like Microsoft Bot Framework, Botkit, Botpress, and
    Hubot provide opinionated abstractions for handling events, sending messages,
    building cards, and deploying bots to a runtime.
- name: Low-Code Bot Builders
  description: SaaS platforms like ManyChat, Chatfuel, Tidio, and Landbot offer visual
    flow editors that let non-developers assemble bots through drag-and-drop nodes,
    templates, and conditional logic.
- name: Human Handoff and Hybrid Conversations
  description: Customer support bots integrate with live agent platforms to escalate
    from automated flows to human agents when intents fall outside the bot's confidence
    threshold or scope.
- name: Channel-Native Rich Messaging
  description: Bots emit channel-specific rich content — Slack blocks, Discord embeds,
    Teams adaptive cards, WhatsApp interactive lists — using a unified abstraction
    or channel-targeted payloads.
- name: Voice and Telephony Bots
  description: Voice-bot platforms like Amazon Lex, Amazon Connect, Voiceflow, and
    Retell AI wire conversational logic into PSTN telephony, IVRs, and voice assistants.
use_cases:
- name: Customer Support Automation
  description: Conversational bots in platforms like Intercom Fin, Drift, Freshchat,
    and Zendesk deflect common support questions, qualify tickets, and hand off to
    human agents with full conversation history.
- name: Lead Qualification and Marketing
  description: Sales chatbots from Drift, ManyChat, and Landbot greet website visitors,
    qualify leads by asking screening questions, and route qualified prospects into
    CRM pipelines.
- name: Internal Productivity and ChatOps
  description: Slack and Teams bots automate routine workflows — deploys, on-call
    alerts, polls, time tracking — bringing operations into the team's primary chat
    channel.
- name: Conversational Commerce
  description: WhatsApp, Messenger, and Instagram bots powered by Sinch, MessageBird,
    WATI, and Twilio handle catalog browsing, order placement, payment collection,
    and shipping notifications.
- name: HR and Recruiting Conversations
  description: Recruiting bots like Paradox Olivia screen candidates, schedule interviews,
    and answer FAQ across SMS, WhatsApp, and career-site chat.
- name: IVR Modernization and Voice Bots
  description: Voice-bot frameworks from Amazon Lex, Google Dialogflow CX, and Voiceflow
    replace touch-tone IVRs with natural-language voice flows for contact centers.
- name: Community and Moderation Bots
  description: Discord and Slack community bots handle onboarding, role assignment,
    moderation, polls, and gamification for online communities.
- name: Knowledge Base Q and A
  description: Bots integrate with knowledge bases and retrieval systems to answer
    policy, product, and how-to questions in chat using grounded responses.
integrations:
- name: Slack
  description: Workplace messaging platform with a rich bot and app ecosystem; the
    de facto channel for ChatOps and internal automation bots.
- name: Microsoft Bot Framework
  description: Microsoft's SDK and channel connector service for building bots that
    deploy across Teams, Web Chat, Direct Line, SMS, and other channels.
- name: Google Dialogflow
  description: Google Cloud's conversational AI platform with intent classification,
    entity extraction, and Dialogflow CX visual flow builder.
- name: Amazon Lex
  description: AWS conversational AI service for building text and voice bots, with
    native integration to Amazon Connect for contact-center voice flows.
- name: Botpress
  description: Open-source conversational AI platform with a visual flow builder,
    NLU engine, and channel integrations for self-hosted bots.
- name: Intercom
  description: Customer messaging platform with the Fin AI agent and a long-standing
    chatbot product for support deflection and proactive messaging.
- name: Twilio
  description: Cloud communications platform exposing SMS, WhatsApp, voice, and chat
    channels that bot frameworks plug into for omnichannel deployment.
- name: ManyChat
  description: Low-code chatbot builder focused on Messenger, Instagram, WhatsApp,
    and SMS for marketing and conversational commerce.
